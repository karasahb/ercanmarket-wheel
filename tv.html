<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ercan Market - Canlı Kazananlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: flex-start;
        }
        .tv-header {
            width: 100%;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(to bottom, #111, transparent);
            margin-bottom: 2rem;
        }
        .tv-logo {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
            letter-spacing: 2px;
        }
        .tv-logo span { color: var(--primary-color); }
        
        .winner-spotlight {
            width: 90%;
            max-width: 850px;
            background: rgba(255, 85, 0, 0.1);
            border: 3px solid var(--primary-color);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 0 50px rgba(255, 85, 0, 0.2);
            animation: pulse 2s infinite;
            transition: all 0.5s ease;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(255, 85, 0, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 60px rgba(255, 85, 0, 0.4); transform: scale(1.02); }
            100% { box-shadow: 0 0 30px rgba(255, 85, 0, 0.2); transform: scale(1); }
        }

        .winner-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; font-weight: 600; font-size: 1rem; }
        .winner-name { font-size: 4rem; font-weight: 800; margin: 0.5rem 0; color: #fff; line-height: 1.1; }
        .winner-prize { font-size: 2.2rem; font-weight: 700; color: var(--primary-color); background: rgba(0,0,0,0.4); padding: 8px 30px; border-radius: 50px; display: inline-block; }

        .recent-list {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .recent-item {
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary-color);
            animation: slideIn 0.5s ease-out;
            margin-bottom: 0.5rem;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .recent-name { font-weight: 600; font-size: 1.2rem; color: #fff; }
        .recent-prize { font-weight: 400; color: var(--primary-color); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="tv-header">
        <h1 class="tv-logo">ERCAN <span>MARKET</span></h1>
    </div>

    <!-- Latest Winner Spotlight -->
    <div id="spotlight" class="winner-spotlight">
        <div class="winner-label" id="spotlight-label">Az Önce Kazandı! 🎊</div>
        <div id="spotlight-name" class="winner-name">...</div>
        <div id="spotlight-prize" class="winner-prize">...</div>
    </div>

    <!-- Hall of Fame View (Hidden by default) -->
    <div id="hof-view" class="hidden" style="width: 90%; max-width: 900px; text-align: center; animation: fadeIn 0.8s ease;">
        <h2 style="color: var(--primary-color); font-size: 2.5rem; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 5px;">🏆 HAFTANIN ŞÖHRETLERİ 🏆</h2>
        <div id="hof-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem;">
            <!-- Top winners injected here -->
        </div>
    </div>

    <div class="winner-label" id="history-label" style="margin-bottom: 1.5rem; font-size: 0.9rem; opacity: 0.6;">Önceki Kazananlar</div>
    
    <div id="winner-history" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1rem; align-items: center;">
        <!-- Only few items here -->
    </div>

    <!-- View Switcher Button -->
    <button id="view-switcher" style="position: fixed; bottom: 20px; right: 20px; background: rgba(255,85,0,0.2); color: white; border: 1px solid var(--primary-color); padding: 10px 20px; border-radius: 50px; cursor: pointer; font-family: Outfit; font-size: 0.8rem; z-index: 100;">🔄 Görünümü Değiştir (Şöhretler / Canlı)</button>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/tv.js"></script>
</body>
</html>
